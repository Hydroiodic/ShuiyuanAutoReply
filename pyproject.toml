[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "shuiyuan-auto-reply"
version = "0.1.0"
description = "A project for automatic replies using LangChain and Google GenAI."
authors = [{ name = "Hydroiodic_Acid", email = "liao_chengfan@sjtu.edu.cn" }]
requires-python = ">=3.12"
dependencies = [
    "aiohttp",
    "aiomysql",
    "apscheduler",
    "dacite",
    "dashscope",
    "ddgs",
    "httpx[socks]",
    "langchain-community",
    "langchain-google-genai",
    "langchain-mcp-adapters",
    "neomodel",
    "numpy",
    "openai",
    "pandas",
    "pillow",
    "pymysql",
    "python-dotenv",
    "sentence-transformers",
    "skia-python",
    "sqlalchemy",
]

[tool.setuptools]
include-package-data = true

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
include = ["shuiyuan_auto_reply*"]

[tool.isort]
profile = "black"
